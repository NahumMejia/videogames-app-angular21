@if (isLoading()) {
  <app-loader />
} @else {
  @if (game()) {
    <article class="game-content">
      <header class="game-header">
        <h1 class="game-title">
          {{ game()?.name }}
        </h1>
      </header>

      <div class="game-important-information">
        <div class="image-container">
          <img class="image" [src]="game()?.background_image" />
        </div>

        <div class="game-description">
          <p>
            {{ game()?.description_raw }}
          </p>
        </div>
      </div>
      
    </article>
  }
}
